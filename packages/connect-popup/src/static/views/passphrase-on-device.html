<div class="passphrase-on-device">
    <div>
        <h3>Enter your passphrase on <span class="device-name"></span></h3>
    </div>
    <div class="loader">
        <p>Waiting...</p>
        <svg class="circular" viewBox="25 25 50 50" preserveAspectRatio="xMidYMid">
            <circle
                class="route"
                cx="50"
                cy="50"
                r="20"
                fill="none"
                stroke=""
                stroke-width="1"
                stroke-miterlimit="10"
            />
            <circle
                class="path"
                cx="50"
                cy="50"
                r="20"
                fill="none"
                stroke-width="1"
                stroke-miterlimit="10"
            />
        </svg>
    </div>
</div>
<!-- Passphrase on device: END -->
