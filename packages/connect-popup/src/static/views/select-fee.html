<div class="select-fee">
    <div class="back-button">
        <span class="arrow"></span>
        <span class="text">Accounts</span>
    </div>
    <div class="content">
        <h3>Select Fee</h3>

        <div class="wrapper">
            <div class="select-fee-list">
                <div class="list custom-fee opener">
                    <div class="fee-data">
                        <span class="fee-title">Custom</span>
                        <div class="fee-info"></div>
                    </div>
                    <div class="bottom">
                        <input class="fee-input" type="number" autocomplete="off" />
                        <p class="note">
                            Setting a custom fee is not recommended. If you select an insufficient
                            fee, your transaction will not be confirmed.
                        </p>
                    </div>
                </div>
            </div>

            <button class="send-button" disabled="disabled">
                Send
                <span>#AMOUNT</span>
            </button>
        </div>
    </div>
</div>
<!-- Fee selection: END -->
