    <div class="list-wrapper">
        <div class="permissions-list">

                      <div class="tooltip">

                      </div>
                      <div class="content">
                          <span class="info-icon"></span>
                          <span>Permission 1</span>
                      </div>
                  </div> -->

        <label class="custom-checkbox">
