name: "[Test] Firmware canary Suite Desktop e2e tests"
# Nightly scheduled check on develop branch
# Builds the desktop app
# Runs full e2e test suite for Suite Desktop
# Uses firmware built nightly from main branch

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-app:
    if: github.repository == 'trezor/trezor-suite'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and Upload Suite Desktop
        uses: ./.github/actions/build-desktop

  load-e2e-matrix:
    if: github.repository == 'trezor/trezor-suite'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.load-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load e2e Matrix
        id: load-matrix
        uses: ./.github/actions/load-e2e-matrix
        with:
          project: "desktop"

  run-e2e-suite-desktop-tests:
    if: github.repository == 'trezor/trezor-suite'
    runs-on: ubuntu-24.04
    needs:
      - build-app
      - load-e2e-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.load-e2e-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: yarn

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-app-build-e2e

      - name: Extract build artifact
        run: tar -xzf app-build.tar.gz -C ${{ github.workspace }}/packages/suite-desktop

      - name: Run Playwright E2E Tests
        uses: ./.github/actions/run-e2e-tests
        env:
          CANARY_FIRMWARE: "true"
        with:
          project: "desktop"
          containers: ${{ matrix.CONTAINERS }}
          workspace-dependencies: "@trezor/suite-desktop"
          test-group: ${{ matrix.TEST_GROUP }}
          additional-grep: "(?!.*@specificFirmware)"
          currents-project-id: "4ytF0E"
          currents-record-key: ${{ secrets.CURRENTS_RECORD_KEY }}
          currents-tags: "fw-canary"
          e2e-passphrase: ${{ secrets.E2E_TEST_PASSPHRASE }}
