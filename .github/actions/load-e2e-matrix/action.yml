name: "Load e2e matrix"
description: "Loads the e2e matrix with groups of tests to run"
inputs:
  project:
    description: "Playwright project name (web|desktop)"
    required: true
  additional-test-groups:
    description: "Additional test groups as a YAML array (optional)"
    required: false
    default: "[]"
outputs:
  matrix:
    description: "E2e test matrix"
    value: ${{ steps.set-matrix.outputs.matrix }}
runs:
  using: "composite"
  steps:
    - name: Generate Matrix
      id: set-matrix
      shell: bash
      run: |
        # Determine the correct matrix file
        MATRIX_FILE="${{ github.workspace }}/packages/suite-desktop-core/e2e/ci/matrix-base-${{ inputs.project }}.yml"

        if [[ ! -f "$MATRIX_FILE" ]]; then
          echo "Error: Matrix file for project '${{ inputs.project }}' not found!" >&2
          exit 1
        fi

        # Convert YAML to JSON
        BASE_MATRIX=$(yq -o=json '.' "$MATRIX_FILE")

        # Convert additional test groups input (if provided)
        ADDITIONAL_GROUPS_JSON=$(echo '${{ inputs.additional-test-groups }}' | yq -o=json '.')

        # Merge additional test groups
        FINAL_MATRIX=$(jq -c --argjson groups "$ADDITIONAL_GROUPS_JSON" '. + $groups' <<<"$BASE_MATRIX")

        # Wrap in "include" and output
        echo "matrix={\"include\": $FINAL_MATRIX}" >> $GITHUB_OUTPUT
